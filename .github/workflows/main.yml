name: Nexus CI/CD Pipeline

on:
  push:
    branches: [ main, production ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # 1. Audit Backend
      - name: Audit Backend Dependencies
        working-directory: ./server
        run: |
          npm ci
          npm audit --audit-level=high

      # 2. Audit Frontend
      - name: Audit Frontend Dependencies
        working-directory: ./client
        run: |
          npm ci
          npm audit --audit-level=high

      # 3. Docker Build (Dry Run)
      - name: Docker Compose Validate
        run: docker compose config

      - name: Build Nexus Server Image
        working-directory: ./server
        run: docker build -t nexus-server:test .

      - name: Build Nexus Frontend Image
        working-directory: ./client
        run: docker build -t nexus-frontend:test .

