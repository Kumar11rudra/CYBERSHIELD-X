name: CyberShield X — CI/CD → Google Cloud Run

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  BACKEND_SERVICE: cybershield-backend
  REGISTRY: gcr.io

jobs:
  # ─── JOB 1: Build & Test ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      # ── Backend ──
      - name: 📦 Install Backend Dependencies
        working-directory: ./server
        run: npm ci --legacy-peer-deps

      - name: 🧪 Run Backend Tests
        working-directory: ./server
        run: npm test --if-present
        env:
          NODE_ENV: test

      # ── Frontend ──
      - name: 📦 Install Frontend Dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build React Client
        working-directory: ./client
        run: npm run build
        env:
          REACT_APP_API_URL: /api
          CI: false

      - name: ✅ Build Successful
        run: echo "Client build completed successfully!"

  # ─── JOB 2: Deploy to Google Cloud Run (only on push to main) ───────────────
  deploy-to-gcp:
    name: Deploy → Google Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: 🐳 Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: 🏗️ Build Backend Docker Image
        working-directory: ./server
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/cybershield-backend:${{ github.sha }} .
          docker tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/cybershield-backend:${{ github.sha }} gcr.io/${{ secrets.GCP_PROJECT_ID }}/cybershield-backend:latest

      - name: 📤 Push Image to Google Container Registry
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/cybershield-backend:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/cybershield-backend:latest

      - name: 🚀 Deploy to Google Cloud Run
        run: |
          gcloud run deploy cybershield-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/cybershield-backend:${{ github.sha }} \
            --platform managed \
            --region asia-south1 \
            --allow-unauthenticated \
            --port 3001 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars="NODE_ENV=production,PORT=3001" \
            --set-secrets="MONGODB_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest,VAULT_ENCRYPTION_KEY=VAULT_ENCRYPTION_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest"

      - name: 🌐 Get Deployment URL
        run: |
          URL=$(gcloud run services describe cybershield-backend --platform managed --region asia-south1 --format 'value(status.url)')
          echo "✅ CyberShield X Backend is LIVE at: $URL"
